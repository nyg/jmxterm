name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  JAVA_VERSION: '25'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.versions.outputs.release }}
    steps:
      - name: Validate branch
        if: github.ref_name != 'master'
        run: |
          echo "::error::Releases must be created from the master branch (current: ${{ github.ref_name }})"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install git-cliff
        run: |
          gh release download --repo orhun/git-cliff --pattern 'git-cliff-*-x86_64-unknown-linux-gnu.tar.gz'
          tar xzf git-cliff-*-x86_64-unknown-linux-gnu.tar.gz --strip-components=1 --wildcards '*/git-cliff'
          sudo mv git-cliff /usr/local/bin/
          git cliff --version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute versions
        id: versions
        run: |
          current=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [[ ! "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-SNAPSHOT$ ]]; then
            echo "::error::Expected semantic SNAPSHOT version (X.Y.Z-SNAPSHOT), got: $current"
            exit 1
          fi

          major=${BASH_REMATCH[1]}
          minor=${BASH_REMATCH[2]}
          patch=${BASH_REMATCH[3]}

          case "${{ inputs.bump }}" in
            patch) release="${major}.${minor}.${patch}" ;;
            minor) release="${major}.$((minor + 1)).0" ;;
            major) release="$((major + 1)).0.0" ;;
            *)
              echo "::error::Unsupported version bump type: ${{ inputs.bump }}"
              exit 1
              ;;
          esac

          # Next development version is always release + patch
          if [[ "$release" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            next="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))-SNAPSHOT"
          fi

          echo "RELEASE_VERSION=$release" >> "$GITHUB_ENV"
          echo "DEVELOPMENT_VERSION=$next" >> "$GITHUB_ENV"
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "Release: $release → Next: $next"

      - name: Check tag does not already exist
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/v${{ env.RELEASE_VERSION }}"; then
            echo "::error::Tag v${{ env.RELEASE_VERSION }} already exists"
            exit 1
          fi

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare release
        run: >
          mvn -B release:prepare
          -DreleaseVersion=${{ env.RELEASE_VERSION }}
          -DdevelopmentVersion=${{ env.DEVELOPMENT_VERSION }}
          -DpushChanges=false

      - name: Checkout release tag
        run: git checkout v${{ env.RELEASE_VERSION }}

      - name: Build artifacts
        run: mvn -B -q --no-transfer-progress clean package

      - name: Rename uber JAR
        run: cp "target/jmxsh-${{ env.RELEASE_VERSION }}-uber.jar" "target/jmxsh-${{ env.RELEASE_VERSION }}.jar"

      - name: Build DEB package
        run: |
          pkg_dir="$(mktemp -d)"

          mkdir -p "$pkg_dir/DEBIAN"
          cat > "$pkg_dir/DEBIAN/control" <<EOF
          Package: jmxsh
          Version: ${{ env.RELEASE_VERSION }}
          Section: misc
          Priority: optional
          Architecture: all
          Maintainer: nyg
          Description: Interactive command-line JMX client
          Distribution: development
          EOF

          mkdir -p "$pkg_dir/usr/share/jmxsh"
          cp "target/jmxsh-${{ env.RELEASE_VERSION }}-uber.jar" "$pkg_dir/usr/share/jmxsh/jmxsh-uber.jar"

          mkdir -p "$pkg_dir/usr/bin"
          cat > "$pkg_dir/usr/bin/jmxsh" <<'LAUNCHER'
          #!/bin/sh -e
          exec java -jar /usr/share/jmxsh/jmxsh-uber.jar "$@"
          LAUNCHER
          chmod 755 "$pkg_dir/usr/bin/jmxsh"

          dpkg-deb --build "$pkg_dir" "target/jmxsh-${{ env.RELEASE_VERSION }}.deb"

      - name: Build RPM package
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rpm > /dev/null

          rpmbuild_dir="$(mktemp -d)"
          mkdir -p "$rpmbuild_dir"/{SPECS,SOURCES,BUILD,RPMS,SRPMS}

          cp "target/jmxsh-${{ env.RELEASE_VERSION }}-uber.jar" "$rpmbuild_dir/SOURCES/"

          cat > "$rpmbuild_dir/SPECS/jmxsh.spec" <<'SPEC'
          Name:           jmxsh
          Version:        ${{ env.RELEASE_VERSION }}
          Release:        1
          Summary:        Interactive command-line JMX client
          License:        Apache-2.0
          Group:          Development/Languages/Java
          BuildArch:      noarch

          %description
          Interactive command-line JMX client for monitoring and managing Java applications.

          %install
          install -d -m 755 %{buildroot}/usr/share/jmxsh
          install -m 644 %{_sourcedir}/jmxsh-${{ env.RELEASE_VERSION }}-uber.jar %{buildroot}/usr/share/jmxsh/jmxsh-uber.jar
          install -d -m 755 %{buildroot}/usr/bin
          cat > %{buildroot}/usr/bin/jmxsh <<'LAUNCHER'
          #!/bin/sh -e
          exec java -jar /usr/share/jmxsh/jmxsh-uber.jar "$@"
          LAUNCHER
          chmod 755 %{buildroot}/usr/bin/jmxsh

          %files
          /usr/share/jmxsh/jmxsh-uber.jar
          /usr/bin/jmxsh
          SPEC

          rpmbuild --define "_topdir $rpmbuild_dir" -bb "$rpmbuild_dir/SPECS/jmxsh.spec"
          cp "$rpmbuild_dir"/RPMS/noarch/*.rpm target/

      - name: Generate checksums
        run: |
          cd target
          sha256sum \
            "jmxsh-${{ env.RELEASE_VERSION }}.jar" \
            "jmxsh-${{ env.RELEASE_VERSION }}.deb" \
            jmxsh-*.rpm \
            > "jmxsh-${{ env.RELEASE_VERSION }}-checksums.txt"

      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          args: --latest --strip all

      - name: Push release commits and tag
        run: |
          git checkout master
          git push origin master
          git push origin v${{ env.RELEASE_VERSION }}

      - name: Create GitHub release
        run: >
          gh release create v${{ env.RELEASE_VERSION }}
          target/jmxsh-${{ env.RELEASE_VERSION }}.jar
          target/jmxsh-${{ env.RELEASE_VERSION }}.deb
          target/jmxsh-*.rpm
          target/jmxsh-${{ env.RELEASE_VERSION }}-checksums.txt
          -F git-cliff/CHANGELOG.md
          --title "Release v${{ env.RELEASE_VERSION }}"
          --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update apt repository
        if: env.APT_GPG_PRIVATE_KEY != ''
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          sudo apt-get update -qq && sudo apt-get install -y -qq apt-utils > /dev/null

          # Import GPG key into an isolated keyring
          export GNUPGHOME=$(mktemp -d)
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          FINGERPRINT=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')

          # Copy .deb into pool
          cp "target/jmxsh-${{ env.RELEASE_VERSION }}.deb" docs/apt/pool/main/

          # Generate Packages index
          cd docs/apt
          apt-ftparchive packages pool/main > dists/stable/main/binary-all/Packages
          gzip -kf dists/stable/main/binary-all/Packages

          # Copy to arch-specific dirs so apt finds packages on amd64/arm64 hosts
          for arch in amd64 arm64; do
            mkdir -p "dists/stable/main/binary-${arch}"
            cp dists/stable/main/binary-all/Packages "dists/stable/main/binary-${arch}/"
            cp dists/stable/main/binary-all/Packages.gz "dists/stable/main/binary-${arch}/"
          done

          # Generate Release file
          apt-ftparchive -c apt-ftparchive.conf release dists/stable > dists/stable/Release

          # Sign Release file
          gpg --batch --yes --default-key "$FINGERPRINT" --detach-sign --armor --output dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --default-key "$FINGERPRINT" --clearsign --output dists/stable/InRelease dists/stable/Release

          cd ../..

          # Clean up isolated keyring
          rm -rf "$GNUPGHOME"

          # Remove .gitkeep files (no longer needed once real files exist)
          rm -f docs/apt/pool/main/.gitkeep docs/apt/dists/stable/main/binary-all/.gitkeep

          # Commit and push
          git add docs/apt/
          git commit -m "chore(release): update apt repository for v${{ env.RELEASE_VERSION }}"
          git push origin master

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to Homebrew tap
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: nyg/homebrew-jmxsh
          event-type: update-formula
          client-payload: >-
            {
              "version": "v${{ needs.release.outputs.release_version }}",
              "java_version": "${{ env.JAVA_VERSION }}"
            }

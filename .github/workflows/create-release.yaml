on:
  push:
    tags:
      - 'v*'

name: Create Release

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set release version (strip leading v)
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build with Maven
        run: mvn -B -q --no-transfer-progress package -Ddist.finalName=jmxsh-${{ env.RELEASE_VERSION }}

      - name: Build DEB package
        run: |
          pkg_dir="$(mktemp -d)"

          mkdir -p "$pkg_dir/DEBIAN"
          cat > "$pkg_dir/DEBIAN/control" <<EOF
          Package: jmxsh
          Version: ${{ env.RELEASE_VERSION }}
          Section: misc
          Priority: optional
          Architecture: all
          Maintainer: nyg
          Description: Interactive command-line JMX client
          Distribution: development
          EOF

          mkdir -p "$pkg_dir/usr/share/jmxsh"
          cp "target/jmxsh-${{ env.RELEASE_VERSION }}-uber.jar" "$pkg_dir/usr/share/jmxsh/jmxsh-uber.jar"

          mkdir -p "$pkg_dir/usr/bin"
          cat > "$pkg_dir/usr/bin/jmxsh" <<'LAUNCHER'
          #!/bin/sh -e
          exec java -jar /usr/share/jmxsh/jmxsh-uber.jar "$@"
          LAUNCHER
          chmod 755 "$pkg_dir/usr/bin/jmxsh"

          dpkg-deb --build "$pkg_dir" "target/jmxsh-${{ env.RELEASE_VERSION }}.deb"

      - name: Build RPM package
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rpm > /dev/null

          rpmbuild_dir="$(mktemp -d)"
          mkdir -p "$rpmbuild_dir"/{SPECS,SOURCES,BUILD,RPMS,SRPMS}

          cp "target/jmxsh-${{ env.RELEASE_VERSION }}-uber.jar" "$rpmbuild_dir/SOURCES/"

          cat > "$rpmbuild_dir/SPECS/jmxsh.spec" <<'SPEC'
          Name:           jmxsh
          Version:        ${{ env.RELEASE_VERSION }}
          Release:        1
          Summary:        Interactive command-line JMX client
          License:        Apache-2.0
          Group:          Development/Languages/Java
          BuildArch:      noarch

          %description
          Interactive command-line JMX client for monitoring and managing Java applications.

          %install
          install -d -m 755 %{buildroot}/usr/share/jmxsh
          install -m 644 %{_sourcedir}/jmxsh-${{ env.RELEASE_VERSION }}-uber.jar %{buildroot}/usr/share/jmxsh/jmxsh-uber.jar
          install -d -m 755 %{buildroot}/usr/bin
          cat > %{buildroot}/usr/bin/jmxsh <<'LAUNCHER'
          #!/bin/sh -e
          exec java -jar /usr/share/jmxsh/jmxsh-uber.jar "$@"
          LAUNCHER
          chmod 755 %{buildroot}/usr/bin/jmxsh

          %files
          /usr/share/jmxsh/jmxsh-uber.jar
          /usr/bin/jmxsh
          SPEC

          rpmbuild --define "_topdir $rpmbuild_dir" -bb "$rpmbuild_dir/SPECS/jmxsh.spec"
          cp "$rpmbuild_dir"/RPMS/noarch/*.rpm target/

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-artifacts
          path: |
            target/jmxsh-${{ env.RELEASE_VERSION }}*.jar
            target/*.deb
            target/*.rpm
          retention-days: 1

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Get latest release tag
        id: prev_release
        run: |
          latest_release=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          if [ "$latest_release" != "null" ] && [ -n "$latest_release" ]; then
            echo "tag=${latest_release}" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        if: steps.prev_release.outputs.found == 'true'
        id: changelog
        uses: requarks/changelog-action@6d71e098526ee17bae963f058d34cd763378337f # v1
        with:
          token: ${{ github.token }}
          fromTag: ${{ github.ref_name }}
          toTag: ${{ steps.prev_release.outputs.tag }}
          includeInvalidCommits: true

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            release-artifacts/**/*.jar
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes || 'Initial release.' }}

name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Mondays at 06:00 UTC

permissions:
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fca7ace96b7d713c7035871441f3c2cc50e17e5f # v3
        with:
          languages: java-kotlin

      - name: Build
        run: mvn -B -q --no-transfer-progress compile -DskipTests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@fca7ace96b7d713c7035871441f3c2cc50e17e5f # v3
        with:
          category: /language:java-kotlin
